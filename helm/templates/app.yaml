{{- if .Values.app.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "weknora.fullname" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weknora.componentLabels" (dict "component" "app" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "weknora.componentSelectorLabels" (dict "component" "app" "context" .) | nindent 6 }}
  # dataFiles PVC 是 RWO（rook-ceph-block），单副本下 RollingUpdate 会死锁：
  # 新 pod 拿不到卷 → 卡 ContainerCreating → 旧 pod 不删 → 卷不释放。
  # Recreate 先删旧 pod 释放 RWO 卷，再建新 pod。多副本前须把 dataFiles 改 RWX。
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "weknora.componentSelectorLabels" (dict "component" "app" "context" .) | nindent 8 }}
    spec:
      {{- include "weknora.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "weknora.serviceAccountName" . }}
      {{- if eq .Values.app.sandbox.mode "kubernetes" }}
      automountServiceAccountToken: true
      {{- end }}
      {{- with .Values.app.podSecurityContext | default .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "weknora.app.image" . }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          {{- with .Values.app.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            # Application settings
            - name: GIN_MODE
              value: {{ .Values.app.env.GIN_MODE | quote }}
            - name: TZ
              value: {{ .Values.app.env.TZ | quote }}
            # Database configuration
            - name: DB_DRIVER
              value: "postgres"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: DB_NAME
            # Redis configuration
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: REDIS_USERNAME
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              value: "0"
            - name: REDIS_PREFIX
              value: "stream:"
            - name: STREAM_MANAGER_TYPE
              value: {{ .Values.app.env.STREAM_MANAGER_TYPE | quote }}
            # Security
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: JWT_SECRET
            - name: TENANT_AES_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: TENANT_AES_KEY
            - name: SYSTEM_AES_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: SYSTEM_AES_KEY
            # Retrieval & Storage
            - name: RETRIEVE_DRIVER
              value: {{ .Values.app.env.RETRIEVE_DRIVER | quote }}
            - name: STORAGE_TYPE
              value: {{ .Values.app.env.STORAGE_TYPE | quote }}
            - name: LOCAL_STORAGE_BASE_DIR
              value: {{ .Values.app.env.LOCAL_STORAGE_BASE_DIR | quote }}
            # Document reader
            - name: DOCREADER_ADDR
              value: "docreader:50051"
            # Processing
            - name: AUTO_RECOVER_DIRTY
              value: {{ .Values.app.env.AUTO_RECOVER_DIRTY | quote }}
            - name: CONCURRENCY_POOL_SIZE
              value: {{ .Values.app.env.CONCURRENCY_POOL_SIZE | quote }}
            - name: ENABLE_GRAPH_RAG
              value: {{ .Values.app.env.ENABLE_GRAPH_RAG | quote }}
            {{- if .Values.neo4j.enabled }}
            # Neo4j configuration (for GraphRAG)
            # NEO4J_ENABLE is the flag the Go code actually gates on (extract.go,
            # initialization.go, container.go). The chart's ENABLE_GRAPH_RAG env
            # is not read by Go code — NEO4J_ENABLE must be set or extraction is
            # silently skipped even with Neo4j deployed.
            - name: NEO4J_ENABLE
              value: "true"
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: NEO4J_USERNAME
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "weknora.secretName" . }}
                  key: NEO4J_PASSWORD
            {{- end }}
            # Sandbox configuration
            - name: WEKNORA_SANDBOX_MODE
              value: {{ .Values.app.sandbox.mode | quote }}
            - name: WEKNORA_SANDBOX_TIMEOUT
              value: {{ .Values.app.sandbox.timeout | quote }}
            - name: WEKNORA_SANDBOX_IMAGE
              value: {{ .Values.app.sandbox.image | quote }}
            {{- if eq .Values.app.sandbox.mode "kubernetes" }}
            - name: WEKNORA_SANDBOX_KUBE_NAMESPACE
              value: {{ .Values.app.sandbox.kubernetes.namespace | quote }}
            - name: WEKNORA_SANDBOX_MAX_CONCURRENT
              value: {{ .Values.app.sandbox.kubernetes.maxConcurrentSandboxes | quote }}
            {{- end }}
            {{- if eq .Values.app.sandbox.mode "opensandbox" }}
            - name: WEKNORA_SANDBOX_OPENSANDBOX_API_URL
              value: {{ .Values.app.sandbox.opensandbox.apiURL | quote }}
            - name: WEKNORA_SANDBOX_OPENSANDBOX_API_KEY
              {{- if .Values.app.sandbox.opensandbox.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.sandbox.opensandbox.existingSecret }}
                  key: apiKey
              {{- else }}
              value: {{ .Values.app.sandbox.opensandbox.apiKey | quote }}
              {{- end }}
            {{- end }}
            {{- with .Values.app.extraEnv }}
            # Additional environment variables
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data-files
              mountPath: /data/files
            {{- if .Values.docreader.sharedVolume.enabled }}
            - name: docreader-tmp
              mountPath: /tmp/docreader
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          {{- with .Values.app.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.app.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data-files
          {{- if .Values.dataFiles.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.dataFiles.persistence.existingClaim | default (printf "%s-data-files" (include "weknora.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.docreader.sharedVolume.enabled }}
        - name: docreader-tmp
          {{- if eq .Values.docreader.sharedVolume.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .Values.docreader.sharedVolume.pvcName | default (printf "%s-docreader-tmp" (include "weknora.fullname" .)) }}
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.docreader.sharedVolume.sizeLimit | default "5Gi" }}
          {{- end }}
        {{- end }}
      {{- with .Values.app.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  # Service name must be "app" - frontend nginx config hardcodes this
  name: app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weknora.componentLabels" (dict "component" "app" "context" .) | nindent 4 }}
spec:
  type: {{ .Values.app.service.type }}
  selector:
    {{- include "weknora.componentSelectorLabels" (dict "component" "app" "context" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
