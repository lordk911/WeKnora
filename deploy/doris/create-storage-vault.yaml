# 在公共 Doris DDC 集群里建指向集群 MinIO 的 Storage Vault 并设为默认。
# 必须在 Litefuse helm install 之前完成（Litefuse auto Doris migration 建的库表数据落"默认 Vault"）。
#
# 依赖：deploy/doris/ddc-cluster.yaml 已 Running（kubectl get ddc -n doris → green）。
# 凭据：ns=doris 内预建 Secret doris-vault-creds（key: MINIO_ACCESS_KEY_ID / MINIO_SECRET_ACCESS_KEY）。
#        由 deploy/scripts/litefuse-bootstrap.sh 创建（值同 ns=litefuse 的 litefuse-secrets 里 MinIO 凭据）。
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: doris-create-vault-sql
  namespace: doris
data:
  vault.sql: |
    -- 建 MinIO（S3 兼容）Storage Vault。字段以官方 Managing Storage Vault 为准（4.x）：
    --   - s3.endpoint 不带 scheme（bare host:port，Doris 自动补 http）
    --   - provider 必填（MinIO=S3）
    --   - path-style 字段是 use_path_style（无 s3. 前缀）
    CREATE STORAGE VAULT IF NOT EXISTS minio_vault
    PROPERTIES (
        "type"="S3",
        "s3.endpoint"="minio.minio:9000",
        "s3.region"="us-east-1",
        "s3.bucket"="litefuse",
        "s3.root.path"="doris/ddc",
        "s3.access_key"="${MINIO_ACCESS_KEY_ID}",
        "s3.secret_key"="${MINIO_SECRET_ACCESS_KEY}",
        "provider"="S3",
        "use_path_style"="true"
    );
    SET minio_vault AS DEFAULT STORAGE VAULT;
    SHOW STORAGE VAULTS;
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-storage-vault
  namespace: doris
  labels:
    app.kubernetes.io/part-of: litefuse
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mysql
          image: __HARBOR__/mysql:5.7
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # mysql 客户端不展开 ${VAR}，用 sed 把凭据注入 SQL
              sed -e "s|\${MINIO_ACCESS_KEY_ID}|${MINIO_ACCESS_KEY_ID}|g" \
                  -e "s|\${MINIO_SECRET_ACCESS_KEY}|${MINIO_SECRET_ACCESS_KEY}|g" \
                  /sql/vault.sql > /tmp/vault.resolved.sql
              mysql -h litefuse-doris-fe.doris -P 9030 -u root --password="${DORIS_PASSWORD:-}" < /tmp/vault.resolved.sql
          env:
            - name: MINIO_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: doris-vault-creds, key: MINIO_ACCESS_KEY_ID } }
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: doris-vault-creds, key: MINIO_SECRET_ACCESS_KEY } }
            - name: DORIS_PASSWORD
              valueFrom: { secretKeyRef: { name: doris-vault-creds, key: DORIS_PASSWORD, optional: true } }
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: doris-create-vault-sql
