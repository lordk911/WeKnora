# Xinference deployment values for WeKnora cluster (xa-k8s.local)
# Chart: deploy/xinference-chart (WeKnora fork of xorbitsai/xinference-helm-charts,
#        with per-worker Deployments per xorbitsai/inference#3740).
#
# Apply with:
#   helm -n xinference upgrade xinference deploy/xinference-chart \
#     -f deploy/xinference-values.yaml
#
# Prerequisite: HAMi must be reconfigured FIRST (node41 splitcount=6, node42 splitcount=1,
# devicememoryscaling=1.0) so worker-0/1 on node41 each get a ~8GB vGPU. See
# deploy/xinference-upgrade-plan.md stage B.

config:
  # Image: retag upstream xprobe/xinference:v2.12.0 and push to Harbor (plan stage A1).
  # Until pushed, this tag will fail to pull — do NOT helm upgrade before A1 completes.
  xinference_image: "harbor.glodon.com/data-stack/xprobe/xinference:v1.9.0-cu128"  # rolled back from v2.12.0 (broken torchcodec/sentence_transformers deps)
  curl_image: harbor-dev.glodon.com/data-stack/curlimages/curl:8.8.0
  image_pull_policy: ""
  model_src: "modelscope"   # ModelScope is reachable inside glodon intranet; overrides upstream "huggingface"
  persistence:
    enabled: true
    createPV: false         # rook-cephfs binds dynamically; no local-storage PV needed
    mountPath: "/data"
  extra_envs: {}
  # Per-worker layout (xorbitsai/inference#3740).
  # Current (v1.9.0 tonight): 2 workers on node41 for bge-m3 + bge-reranker.
  # Planned 6-worker layout (jina-clip-v2 / Qwen3-VL-Reranker-8B / 27B need v2.11.0,
  # tomorrow): see deploy/xinference-resource-plan.md — node41 4 shared via
  # nvidia.com/gpumem-percentage, node42 2 whole-card (27B + reserve).
  workers:
    - name: worker-0          # hosts bge-m3 (text embedding)
      nodeSelector:
        kubernetes.io/hostname: "xa-k8s-node41-gpu"
      resources:
        requests: {cpu: "8", memory: "32Gi", nvidia.com/gpu: "1"}
        limits:   {cpu: "16", memory: "64Gi", nvidia.com/gpu: "1"}
    - name: worker-1          # hosts bge-reranker-v2-m3 (text rerank, GPU not CPU)
      nodeSelector:
        kubernetes.io/hostname: "xa-k8s-node41-gpu"
      resources:
        requests: {cpu: "4", memory: "16Gi", nvidia.com/gpu: "1"}
        limits:   {cpu: "8", memory: "32Gi", nvidia.com/gpu: "1"}
    # Planned (enable with v2.11.0 tomorrow) — see deploy/xinference-resource-plan.md:
    # - name: worker-2  # node41 GPU1, gpumem 25% → jina-clip-v2 (multimodal embed)
    # - name: worker-3  # node41 GPU1, gpumem 40% → Qwen3-VL-Reranker-8B (multimodal rerank)
    # - name: worker-4  # node42 GPU0, whole card → 27B compact LLM
    # - name: worker-5  # node42 GPU1, whole card → reserve

# Shared model cache (reused across workers; existing PVC is kept via helm.sh/resource-policy).
pvc:
  accessModes:
    - ReadWriteMany
  storageClassName: "rook-cephfs"
  sharedVolumeClaim:
    storageRequest: "200Gi"
  volumeMode: ""

# Supervisor does not need a GPU; the chart default (deploy/xinference-chart/values.yaml)
# has nvidia.com/gpu removed for the same reason.
xinferenceSupervisor:
  supervisor:
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "1"
        memory: 4Gi
    vgpu:
      enabled: false

# Worker defaults (used by the per-worker template for fields not set per-worker).
xinferenceWorker:
  strategy:
    type: Recreate
  worker:
    initContainers:
      command: ['sh', '-c', "until curl -v http://service-supervisor:9997/v1/address; do echo waiting for supervisor; sleep 1; done"]
    args:
      - -e
      - http://service-supervisor:9997
      - --host
      - $(POD_IP)
      - --worker-port
      - "30001"
      - --log-level
      - debug
    ports:
      - containerPort: 30001
    resources:
      requests: {cpu: "4", memory: "16Gi", nvidia.com/gpu: "1"}
      limits:   {cpu: "8", memory: "32Gi", nvidia.com/gpu: "1"}
    vgpu:
      enabled: false

serviceWeb:
  type: NodePort
  ports:
    - nodePort: 30003
      port: 9997
      protocol: TCP
      targetPort: 9997

serviceSupervisor:
  type: ClusterIP
  ports:
    - name: service-supervisor-oscar
      port: 9999
      protocol: TCP
      targetPort: 9999
    - name: service-supervisor-web
      port: 9997
      protocol: TCP
      targetPort: 9997

serviceWorker:
  type: ClusterIP
  ports:
    - port: 30001
      protocol: TCP
      targetPort: 30001
