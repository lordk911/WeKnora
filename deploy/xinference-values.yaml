# Xinference deployment values for WeKnora cluster (xa-k8s.local)
# Chart: deploy/xinference-chart (WeKnora fork of xorbitsai/xinference-helm-charts,
#        with per-worker Deployments per xorbitsai/inference#3740).
#
# Apply with:
#   helm -n xinference upgrade xinference deploy/xinference-chart \
#     -f deploy/xinference-values.yaml
#
# Prerequisite: HAMi must be reconfigured FIRST (node41 splitcount=6, node42 splitcount=1,
# devicememoryscaling=1.0) so worker-0/1 on node41 each get a ~8GB vGPU. See
# deploy/xinference-upgrade-plan.md stage B.

config:
  # Image: retag upstream xprobe/xinference:v2.12.0 and push to Harbor (plan stage A1).
  # Until pushed, this tag will fail to pull — do NOT helm upgrade before A1 completes.
  xinference_image: "harbor.glodon.com/data-stack/xprobe/xinference:v2.12.0"  # v2.12.0 + vLLM engine bypasses torchcodec bug
  curl_image: harbor-dev.glodon.com/data-stack/curlimages/curl:8.8.0
  image_pull_policy: ""
  model_src: "modelscope"   # ModelScope is reachable inside glodon intranet; overrides upstream "huggingface"
  persistence:
    enabled: true
    createPV: false         # rook-cephfs binds dynamically; no local-storage PV needed
    mountPath: "/data"
  extra_envs: {}
  # Per-worker layout (xorbitsai/inference#3740). Full Qwen3 set on v2.12.0 + vLLM.
  # vLLM default gpu_memory_utilization=0.9 grabs 90% of visible GPU; to share one
  # physical A40 among multiple workers, give each a HAMi vGPU slice via
  # nvidia.com/gpumem-percentage (vLLM then sees only that slice). See
  # deploy/xinference-resource-plan.md.
  #
  # node41: 2× A40, 4 workers. Each worker requests nvidia.com/gpu:2 (2 vGPUs)
  # at gpumem-percentage=25 (12GB each, 24GB per worker) so HAMi exposes 2
  # virtual GPUs to the pod. This enables INTRA-WORKER multi-replica: launch
  # each model with --replica 2 --gpu-idx 0,1 → 2 independent vLLM instances
  # per worker, one per vGPU (data-parallel, NOT tensor-parallel — no NCCL
  # cross-GPU cooperation, so HAMi's multi-vGPU-per-pod bug that broke 27B
  # TP=2 does NOT apply here). 2 vLLM instances per model = 2× throughput.
  # HAMi packs 2 vGPUs per pod onto one physical GPU (2 pods × 2 vGPUs × 25%
  # = 100% per card), giving a 2-2 balance across the 2 physical A40s.
  # NOTE: tested earlier that intra-worker replica works; --n-gpu>1 (TP) does
  # NOT — keep models single-GPU, use --replica for throughput.
  workers:
    # node41 — 4 workers, each 2 vGPUs (12GB×2), one model per worker, 2 replicas each
    - name: worker-0          # Qwen3-Embedding-0.6B ×2 replicas (text embedding, dim 1024)
      nodeSelector: {kubernetes.io/hostname: "xa-k8s-node41-gpu"}
      vgpu:
        enabled: true
        resources:
          requests: {cpu: "6", memory: "16Gi", nvidia.com/gpu: "2"}
          limits:   {cpu: "12", memory: "32Gi", nvidia.com/gpu: "2", nvidia.com/gpumem-percentage: "25", nvidia.com/gpucores: "25"}
    - name: worker-1          # Qwen3-Reranker-0.6B ×2 replicas (text rerank)
      nodeSelector: {kubernetes.io/hostname: "xa-k8s-node41-gpu"}
      vgpu:
        enabled: true
        resources:
          requests: {cpu: "6", memory: "16Gi", nvidia.com/gpu: "2"}
          limits:   {cpu: "12", memory: "32Gi", nvidia.com/gpu: "2", nvidia.com/gpumem-percentage: "25", nvidia.com/gpucores: "25"}
    - name: worker-2          # Qwen3-VL-Embedding-2B ×2 replicas (multimodal embed)
      nodeSelector: {kubernetes.io/hostname: "xa-k8s-node41-gpu"}
      vgpu:
        enabled: true
        resources:
          requests: {cpu: "6", memory: "16Gi", nvidia.com/gpu: "2"}
          limits:   {cpu: "12", memory: "32Gi", nvidia.com/gpu: "2", nvidia.com/gpumem-percentage: "25", nvidia.com/gpucores: "25"}
    - name: worker-3          # Qwen3-VL-Reranker-2B ×2 replicas (multimodal rerank)
      nodeSelector: {kubernetes.io/hostname: "xa-k8s-node41-gpu"}
      vgpu:
        enabled: true
        resources:
          requests: {cpu: "6", memory: "16Gi", nvidia.com/gpu: "2"}
          limits:   {cpu: "12", memory: "32Gi", nvidia.com/gpu: "2", nvidia.com/gpumem-percentage: "25", nvidia.com/gpucores: "25"}
    # node42 — 27B LLM (whole card) + reserve
    # node42 — 27B LLM, tensor-parallel=2 across both A40s (96GB) for 128K context
    - name: worker-4          # Qwen3.6-27B-FP8 (official FP8, ~27GB; --n-gpu 2 --max-model-len 131072)
      nodeSelector: {kubernetes.io/hostname: "xa-k8s-node42-gpu"}
      resources:
        requests: {cpu: "16", memory: "64Gi", nvidia.com/gpu: "1"}
        limits:   {cpu: "32", memory: "128Gi", nvidia.com/gpu: "1"}
    - name: worker-5          # node42 GPU1, for 27B distributed (--n-worker 2)
      nodeSelector: {kubernetes.io/hostname: "xa-k8s-node42-gpu"}
      resources:
        requests: {cpu: "16", memory: "64Gi", nvidia.com/gpu: "1"}
        limits:   {cpu: "32", memory: "128Gi", nvidia.com/gpu: "1"}

# Shared model cache (reused across workers; existing PVC is kept via helm.sh/resource-policy).
pvc:
  accessModes:
    - ReadWriteMany
  storageClassName: "rook-cephfs"
  sharedVolumeClaim:
    storageRequest: "200Gi"
  volumeMode: ""

# Supervisor does not need a GPU; the chart default (deploy/xinference-chart/values.yaml)
# has nvidia.com/gpu removed for the same reason.
xinferenceSupervisor:
  supervisor:
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "1"
        memory: 4Gi
    vgpu:
      enabled: false

# Worker defaults (used by the per-worker template for fields not set per-worker).
xinferenceWorker:
  strategy:
    type: Recreate
  worker:
    initContainers:
      command: ['sh', '-c', "until curl -v http://service-supervisor:9997/v1/address; do echo waiting for supervisor; sleep 1; done"]
    args:
      - -e
      - http://service-supervisor:9997
      - --host
      - $(POD_IP)
      - --worker-port
      - "30001"
      - --log-level
      - debug
    ports:
      - containerPort: 30001
    resources:
      requests: {cpu: "4", memory: "16Gi", nvidia.com/gpu: "1"}
      limits:   {cpu: "8", memory: "32Gi", nvidia.com/gpu: "1"}
    vgpu:
      enabled: false

serviceWeb:
  type: NodePort
  ports:
    - nodePort: 30003
      port: 9997
      protocol: TCP
      targetPort: 9997

serviceSupervisor:
  type: ClusterIP
  ports:
    - name: service-supervisor-oscar
      port: 9999
      protocol: TCP
      targetPort: 9999
    - name: service-supervisor-web
      port: 9997
      protocol: TCP
      targetPort: 9997

serviceWorker:
  type: ClusterIP
  ports:
    - port: 30001
      protocol: TCP
      targetPort: 30001
