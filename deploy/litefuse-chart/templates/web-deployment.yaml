{{/*
Litefuse Web — API + Next.js 前端。port 3000。env 与 worker 共享（_helpers.appEnv）。
*/}}
{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litefuse.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litefuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "litefuse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  strategy:
    type: {{ .Values.web.strategy }}
  template:
    metadata:
      labels:
        {{- include "litefuse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "litefuse.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- include "litefuse.appEnv" . | nindent 12 }}
          # Litefuse Web 启动较快；start_period 留 30s 等 Prisma 迁移 + Doris 连接。
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /api/public/health
              port: http
            periodSeconds: 10
            failureThreshold: 30
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "litefuse.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litefuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    {{- include "litefuse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
{{- end }}
