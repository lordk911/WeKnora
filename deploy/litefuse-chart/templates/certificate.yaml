{{/*
TLS 证书：用 cert-manager selfsigned-issuer 生成自签证书（仿 weknora 实际部署做法）。
生产若公司有 *.<your-domain> 通配证书，可设 ingress.tls.selfSignedIssuer=false 并预建同名 Secret。
前提：集群已装 cert-manager。
*/}}
{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled .Values.ingress.tls.selfSignedIssuer }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "litefuse.fullname" . }}-selfsigned-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litefuse.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tls.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litefuse.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  duration: 2160h        # 90d
  renewBefore: 360h      # 15d
  issuerRef:
    name: {{ include "litefuse.fullname" . }}-selfsigned-issuer
    kind: Issuer
  dnsNames:
    - {{ .Values.ingress.host | quote }}
{{- end }}
