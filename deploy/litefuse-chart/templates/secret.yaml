{{/*
可选：开发/测试时由 chart 直接创建 Secret（含全部敏感 env）。
生产默认 secrets.create=false，由 deploy/scripts/litefuse-bootstrap.sh 预建外部 Secret
（secrets.existingSecret=litefuse-secrets），密钥不进 helm values、不进 git。
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litefuse.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litefuse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
