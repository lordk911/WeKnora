# Alertmanager CR merge patch: 加 email receiver (告警发 shenk-b@glodon.com)
# 应用: kubectl -n prometheus patch alertmanager prometheus-stack-kube-prom-alertmanager --type=merge --patch-file deploy/alertmanager-email-patch.yaml
spec:
  config: |-
    global:
      resolve_timeout: 5m
      smtp_smarthost: mail.glodon.com:587
      smtp_from: DGBOT@glodon.com
      smtp_auth_username: 'grandsoft\DGBOT'
      smtp_auth_password: 'Glodon@0902'
      smtp_require_tls: false   # 587 STARTTLS; 先 false 宽松(内部服务器若要求 STARTTLS 再改 true)
    route:
      group_by: [namespace, alertname]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: email
    receivers:
      - name: email
        email_configs:
          - to: shenk-b@glodon.com
            send_resolved: true
