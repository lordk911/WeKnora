global:
  resolve_timeout: 5m
  smtp_smarthost: mail.glodon.com:587
  smtp_from: DGBOT@glodon.com
  smtp_auth_username: 'grandsoft\DGBOT'
  smtp_auth_password: 'Glodon@0902'
  smtp_require_tls: false   # 587 STARTTLS; 先 false 宽松, 服务器要求 STARTTLS 再改 true
inhibit_rules:
- equal: [namespace, alertname]
  source_matchers: [severity = critical]
  target_matchers: [severity =~ warning|info]
- equal: [namespace, alertname]
  source_matchers: [severity = warning]
  target_matchers: [severity = info]
- equal: [namespace]
  source_matchers: [alertname = InfoInhibitor]
  target_matchers: [severity = info]
- target_matchers: [alertname = InfoInhibitor]
route:
  group_by: [namespace]
  group_interval: 5m
  group_wait: 30s
  receiver: email
  repeat_interval: 12h
  routes:
  - matchers: [alertname = "Watchdog"]
    receiver: "null"   # Watchdog 健康检查不轰炸邮箱
receivers:
- name: "null"
- name: email
  email_configs:
  - to: shenk-b@glodon.com
    send_resolved: true
templates:
- /etc/alertmanager/config/*.tmpl
