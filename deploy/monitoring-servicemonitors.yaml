# 监控补充: ServiceMonitors (ceph/minio/milvus) + PrometheusRule (告警规则)
# prometheus 选 release=prometheus-stack label 的 ServiceMonitor, 所以每个 SM 都带这 label
# 应用: kubectl apply -f deploy/monitoring-additions.yaml
---
# 1. Ceph mgr prometheus exporter (port 9283, 无 auth)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rook-ceph-mgr
  namespace: rook-ceph
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: rook-ceph-mgr
  namespaceSelector:
    matchNames: [rook-ceph]
  endpoints:
  - port: http-metrics
    interval: 30s
    scrapeTimeout: 15s
---
# 2. MinIO metrics (port 9000 tcp-api, MINIO_PROMETHEUS_AUTH_TYPE=public 无 auth)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio
  namespace: minio
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/component: minio
  namespaceSelector:
    matchNames: [minio]
  endpoints:
  - port: tcp-api
    path: /minio/v2/metrics/cluster
    interval: 30s
    scrapeTimeout: 15s
  - port: tcp-api
    path: /minio/v2/metrics/node
    interval: 30s
    scrapeTimeout: 15s
  - port: tcp-api
    path: /minio/v2/metrics/bucket
    interval: 60s
    scrapeTimeout: 30s
  - port: tcp-api
    path: /minio/v2/metrics/resource
    interval: 60s
    scrapeTimeout: 30s
---
# 3. Milvus metrics (port 9091 metrics, 无 auth)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: milvus
  namespace: milvus
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: milvus
  namespaceSelector:
    matchNames: [milvus]
  endpoints:
  - port: metrics
    interval: 30s
    scrapeTimeout: 15s
